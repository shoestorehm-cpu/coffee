<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بن الكويبي - تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Tajawal', sans-serif;
  background: #1a0a00;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 30% 20%, #3E1F0044 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, #C9A84C22 0%, transparent 50%);
  pointer-events: none;
}
/* نقاط زخرفية */
.dots {
  position: fixed;
  inset: 0;
  background-image: radial-gradient(#ffffff08 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
}
.login-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 24px;
  padding: 50px 40px;
  width: 420px;
  max-width: 95vw;
  position: relative;
  backdrop-filter: blur(20px);
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.1);
  animation: slideUp 0.6s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.logo {
  text-align: center;
  margin-bottom: 40px;
}
.logo-icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #C9A84C, #8B5E1A);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(201,168,76,0.3);
}
.logo h1 {
  color: #C9A84C;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 1px;
}
.logo p {
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  margin-top: 4px;
}
.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  margin-bottom: 8px;
  font-weight: 500;
}
input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 14px 16px;
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  transition: all 0.3s;
  outline: none;
}
input:focus {
  border-color: #C9A84C;
  background: rgba(201,168,76,0.05);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, #C9A84C, #8B5E1A);
  border: none;
  border-radius: 12px;
  padding: 16px;
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
  letter-spacing: 1px;
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.4); }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.error-msg {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 10px;
  padding: 12px 16px;
  color: #fca5a5;
  font-size: 14px;
  margin-bottom: 20px;
  display: none;
  text-align: center;
}
.store-link {
  text-align: center;
  margin-top: 24px;
}
.store-link a {
  color: rgba(201,168,76,0.7);
  text-decoration: none;
  font-size: 14px;
  transition: color 0.3s;
}
.store-link a:hover { color: #C9A84C; }
.role-badges {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 24px;
  flex-wrap: wrap;
}
.badge {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 4px 12px;
  color: rgba(255,255,255,0.4);
  font-size: 11px;
}
</style>
</head>
<body>
<div class="dots"></div>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">☕</div>
    <h1>بن الكويبي</h1>
    <p>نظام إدارة المحل</p>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label>اسم المستخدم</label>
    <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username">
  </div>
  <div class="form-group">
    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password">
  </div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">دخول</button>
  <div class="store-link">
    <a href="index.html">← العودة إلى المتجر</a>
  </div>
  <div class="role-badges">
    <span class="badge">مدير</span>
    <span class="badge">كاشير</span>
    <span class="badge">موظف</span>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw1xD8gxV4-KNFUZlNBSbjXrhqkN-RsuqrfDH-BQpRqZzRGO21vXKAHPenw6FF5_7WY/exec';

document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });

// تحقق إذا كان مسجل دخول
const user = JSON.parse(localStorage.getItem('bk_user') || 'null');
if (user) redirectByRole(user.role);

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if (!username || !password) { showError('الرجاء إدخال اسم المستخدم وكلمة المرور'); return; }

  btn.disabled = true;
  btn.textContent = 'جاري التحقق...';
  err.style.display = 'none';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('bk_user', JSON.stringify(data.user));
      redirectByRole(data.user.role);
    } else {
      showError(data.message || 'بيانات الدخول غير صحيحة');
    }
  } catch (e) {
    // وضع التجربة المحلية
    if (username === 'admin' && password === 'admin123') {
      localStorage.setItem('bk_user', JSON.stringify({id:'1', name:'المدير', username:'admin', role:'مدير'}));
      redirectByRole('مدير');
    } else if (username === 'cashier' && password === 'cashier123') {
      localStorage.setItem('bk_user', JSON.stringify({id:'2', name:'الكاشير', username:'cashier', role:'كاشير'}));
      redirectByRole('كاشير');
    } else {
      showError('خطأ في الاتصال. تأكد من إعداد الـ API أو استخدم بيانات تجريبية');
    }
  }

  btn.disabled = false;
  btn.textContent = 'دخول';
}

function redirectByRole(role) {
  if (role === 'كاشير') window.location.href = 'cashier.html';
  else if (role === 'موظف') window.location.href = 'admin.html';
  else window.location.href = 'admin.html';
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
